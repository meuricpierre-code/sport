<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f14">
<title>SCULPTÉ · Pierre</title>
<style>
:root{
  --bg:#0d0f14; --card:#161a22; --card2:#1e2431; --tx:#eceef4; --mut:#8b93a7;
  --acc:#ff7a2f; --acc2:#ffb15c; --ok:#3ddc84; --warn:#ffd166; --bad:#ff5c6c;
  --line:#262d3d; --blue:#5aa9ff; --r:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  background:var(--bg); color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  padding-bottom:calc(88px + env(safe-area-inset-bottom));
  overscroll-behavior-y:contain;
}
header{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(135deg,#151a24 0%,#1a1420 100%);
  border-bottom:1px solid var(--line);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
}
.hrow{display:flex;justify-content:space-between;align-items:center;gap:8px}
.htitle{font-weight:800;font-size:1.05rem;letter-spacing:.5px}
.htitle span{background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
.hsub{color:var(--mut);font-size:.72rem;margin-top:2px}
.phasebadge{
  font-size:.68rem;font-weight:700;padding:5px 10px;border-radius:999px;white-space:nowrap;
  background:rgba(255,122,47,.15);color:var(--acc2);border:1px solid rgba(255,122,47,.35);
}
main{padding:14px 14px 0;max-width:560px;margin:0 auto}
.page{display:none}
.page.on{display:block;animation:fadein .18s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px}
.card h3{font-size:.95rem;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card h3 .sub{font-weight:400;color:var(--mut);font-size:.75rem}
.mut{color:var(--mut)} .sm{font-size:.78rem} .xs{font-size:.7rem}
.ok{color:var(--ok)} .warn{color:var(--warn)} .bad{color:var(--bad)} .accent{color:var(--acc2)}
.row{display:flex;align-items:center;gap:8px}
.spread{display:flex;justify-content:space-between;align-items:center;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
button{font-family:inherit;border:none;cursor:pointer}
.btn{
  display:block;width:100%;padding:14px;border-radius:14px;font-size:1rem;font-weight:700;
  background:linear-gradient(90deg,var(--acc),#ff9548);color:#1a1005;
  box-shadow:0 4px 18px rgba(255,122,47,.25);
}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--card2);color:var(--tx);box-shadow:none;border:1px solid var(--line)}
.btn.small{padding:9px 12px;font-size:.82rem;width:auto;display:inline-block;border-radius:11px}
.btn.ok{background:linear-gradient(90deg,#27b568,#3ddc84);color:#04150b}
.btn.danger{background:none;border:1px solid rgba(255,92,108,.4);color:var(--bad)}
.chip{
  display:inline-block;padding:7px 13px;border-radius:999px;font-size:.78rem;font-weight:600;
  background:var(--card2);color:var(--mut);border:1px solid var(--line);margin:0 6px 8px 0;
}
.chip.on{background:rgba(255,122,47,.16);color:var(--acc2);border-color:rgba(255,122,47,.45)}
.badge{font-size:.62rem;font-weight:800;padding:3px 8px;border-radius:999px;letter-spacing:.3px}
.badge.up{background:rgba(61,220,132,.15);color:var(--ok);border:1px solid rgba(61,220,132,.35)}
.badge.pr{background:rgba(255,209,102,.15);color:var(--warn);border:1px solid rgba(255,209,102,.4)}
.badge.f{background:rgba(90,169,255,.13);color:var(--blue);border:1px solid rgba(90,169,255,.35)}
.badge.rest{background:var(--card2);color:var(--mut);border:1px solid var(--line)}
.pbar{height:8px;background:var(--card2);border-radius:99px;overflow:hidden;margin:6px 0 4px}
.pbar>div{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .4s ease;min-width:2px}
.pbar.green>div{background:linear-gradient(90deg,#27b568,#3ddc84)}
/* exercise logging */
.exo{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.exo.done{border-color:rgba(61,220,132,.35)}
.exohead{padding:12px 14px;display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.exohead .name{font-weight:700;font-size:.95rem}
.exohead .meta{color:var(--mut);font-size:.72rem;margin-top:3px;line-height:1.5}
.setrow{display:flex;align-items:center;gap:6px;padding:7px 12px;border-top:1px solid var(--line)}
.setnum{width:22px;text-align:center;color:var(--mut);font-size:.75rem;font-weight:700;flex-shrink:0}
.stepper{display:flex;align-items:center;background:var(--card2);border-radius:12px;border:1px solid var(--line);flex:1;min-width:0}
.stepper button{width:40px;height:44px;background:none;color:var(--acc2);font-size:1.25rem;font-weight:700;flex-shrink:0}
.stepper input{
  flex:1;min-width:0;background:none;border:none;color:var(--tx);text-align:center;
  font-size:1.05rem;font-weight:700;height:44px;font-family:inherit;
}
.stepper input:focus{outline:none}
.stepper .unit{font-size:.6rem;color:var(--mut);position:absolute}
.vbtn{
  width:46px;height:44px;border-radius:12px;background:var(--card2);border:1px solid var(--line);
  color:var(--mut);font-size:1.15rem;font-weight:800;flex-shrink:0;
}
.vbtn.on{background:rgba(61,220,132,.18);border-color:rgba(61,220,132,.5);color:var(--ok)}
.exonote{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--tx);
  padding:9px 11px;font-family:inherit;font-size:.82rem;margin-top:8px}
.exonote::placeholder{color:#5a6175}
.collapse-btn{background:none;color:var(--mut);font-size:1.05rem;padding:4px 6px}
/* timer */
#timerbar{
  position:fixed;left:12px;right:12px;bottom:calc(96px + env(safe-area-inset-bottom));z-index:80;
  background:#1a2130;border:1px solid rgba(255,177,92,.5);border-radius:16px;padding:11px 16px;
  display:none;align-items:center;gap:12px;box-shadow:0 8px 30px rgba(0,0,0,.5);
}
#timerbar.on{display:flex;animation:fadein .18s ease}
#timerval{font-size:1.7rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--acc2);min-width:74px}
#timerbar.zero #timerval{color:var(--ok)}
/* nav */
nav{
  position:fixed;bottom:0;left:0;right:0;z-index:60;display:flex;
  background:rgba(16,19,26,.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
nav button{flex:1;background:none;color:var(--mut);font-size:.62rem;font-weight:600;padding:5px 2px;border-radius:12px}
nav button .ico{display:block;font-size:1.35rem;margin-bottom:2px;filter:grayscale(1);opacity:.6}
nav button.on{color:var(--acc2)} nav button.on .ico{filter:none;opacity:1}
/* charts */
.chartbox{background:var(--card2);border-radius:12px;padding:8px 4px 2px;margin-top:8px}
svg{display:block;width:100%}
/* modal */
#modal{position:fixed;inset:0;background:rgba(5,7,10,.75);z-index:100;display:none;align-items:flex-end;justify-content:center}
#modal.on{display:flex}
#modalbox{
  background:var(--card);border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;max-width:560px;
  max-height:82vh;overflow-y:auto;padding:20px 18px calc(20px + env(safe-area-inset-bottom));
  animation:slideup .22s ease;
}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
/* fiches */
details.fiche{border-top:1px solid var(--line);padding:10px 2px}
details.fiche summary{list-style:none;display:flex;justify-content:space-between;align-items:center;gap:8px;font-weight:600;font-size:.88rem;cursor:pointer}
details.fiche summary::-webkit-details-marker{display:none}
details.fiche .fbody{padding:10px 2px 4px;font-size:.82rem;line-height:1.55;color:#c6cbd8}
details.fiche .fbody b{color:var(--acc2);font-size:.7rem;letter-spacing:.5px}
.tbl{width:100%;border-collapse:collapse;font-size:.8rem}
.tbl td,.tbl th{padding:7px 6px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
.tbl th{color:var(--mut);font-size:.68rem;text-transform:uppercase;letter-spacing:.4px}
.big{font-size:1.55rem;font-weight:800}
.statbox{background:var(--card2);border-radius:12px;padding:10px;text-align:center}
.statbox .v{font-size:1.15rem;font-weight:800}
.statbox .l{font-size:.62rem;color:var(--mut);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.quote{font-style:italic;color:var(--mut);font-size:.78rem;text-align:center;padding:4px 10px 14px;line-height:1.5}
input[type=number],input[type=date],select,textarea{
  background:var(--card2);border:1px solid var(--line);border-radius:11px;color:var(--tx);
  padding:11px;font-family:inherit;font-size:1rem;width:100%;
}
.ebtn{width:38px;height:38px;border-radius:10px;background:var(--card);border:1px solid var(--line);color:var(--acc2);font-size:.9rem;flex-shrink:0}
.ebtn:disabled{opacity:.3;color:var(--mut)}
#modalbox input[type=text],#modalbox input:not([type]){background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--tx);padding:8px 10px;font-family:inherit;font-size:.85rem}
.eexo{border:1px solid var(--line);border-radius:12px;padding:8px 10px;margin-bottom:8px;background:var(--card2)}
.echip{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 2px;border-top:1px solid var(--line);font-size:.85rem}
.tgl{width:50px;height:29px;border-radius:99px;background:var(--card2);border:1px solid var(--line);position:relative;transition:.2s}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:var(--mut);transition:.2s}
.tgl.on{background:rgba(61,220,132,.25);border-color:rgba(61,220,132,.5)}
.tgl.on::after{left:24px;background:var(--ok)}
.alertcard{border-radius:var(--r);padding:12px 14px;margin-bottom:12px;font-size:.83rem;line-height:1.5;border:1px solid}
.alertcard.info{background:rgba(90,169,255,.08);border-color:rgba(90,169,255,.3)}
.alertcard.warn{background:rgba(255,209,102,.07);border-color:rgba(255,209,102,.3)}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <div>
      <div class="htitle">💪 <span>SCULPTÉ</span> · Pierre</div>
      <div class="hsub" id="hdate"></div>
    </div>
    <div class="phasebadge" id="hphase"></div>
  </div>
</header>

<main>
  <div class="page" id="pg-home"></div>
  <div class="page" id="pg-workout"></div>
  <div class="page" id="pg-progress"></div>
  <div class="page" id="pg-body"></div>
  <div class="page" id="pg-guide"></div>
</main>

<div id="timerbar">
  <div id="timerval">--</div>
  <div style="flex:1">
    <div class="sm" style="font-weight:700" id="timerlabel">Repos</div>
    <div class="pbar" style="margin:4px 0 0"><div id="timerprog" style="width:100%"></div></div>
  </div>
  <button class="btn small ghost" onclick="Timer.add(30)">+30s</button>
  <button class="btn small ghost" onclick="Timer.stop()">✕</button>
</div>

<div id="modal" onclick="if(event.target===this)closeModal()"><div id="modalbox"></div></div>

<nav>
  <button data-pg="home" class="on"><span class="ico">🏠</span>Jour</button>
  <button data-pg="workout"><span class="ico">🏋️</span>Séance</button>
  <button data-pg="progress"><span class="ico">📈</span>Progrès</button>
  <button data-pg="body"><span class="ico">⚖️</span>Mesures</button>
  <button data-pg="guide"><span class="ico">📖</span>Guide</button>
</nav>

<script>
/* ============ DONNÉES DU PROGRAMME (source : Programme_Sculpte_6_Mois_Pierre.pdf + coaching 06/07/2026) ============ */
const START = new Date(2026,6,6); // lundi 6 juillet 2026, semaine 1
const TOTAL_WEEKS = 26;

// type: w=charge totale kg | wm=kg par main | as=kg d'assistance (moins = mieux) | t=secondes | max=reps max
const EX = {
  dcb:   {n:"Développé couché barre",      f:27, m:"Pectoraux, triceps", type:"w",  inc:2.5},
  dch:   {n:"Développé couché haltères",   f:1,  m:"Pectoraux, triceps", type:"wm", inc:2},
  latpd: {n:"Tirage vertical (lat pulldown)",f:2, m:"Dos, biceps",       type:"w",  inc:2.5},
  devep: {n:"Développé épaules haltères",  f:3,  m:"Épaules · dossier 85-90° !", type:"wm", inc:2},
  tirh:  {n:"Tirage horizontal (pulley row)",f:4, m:"Milieu du dos",     type:"w",  inc:2.5},
  elevlat:{n:"Élévations latérales",       f:5,  m:"Épaules (carrure) · LÉGER", type:"wm", inc:1},
  curl:  {n:"Curl biceps haltères",        f:6,  m:"Biceps · superset avec triceps", type:"wm", inc:1},
  curlinc:{n:"Curl incliné 45°",           f:6,  m:"Biceps (étirement)", type:"wm", inc:1},
  triceps:{n:"Extension triceps poulie corde",f:7,m:"Triceps · superset avec curl", type:"w", inc:2.5},
  presse:{n:"Presse à cuisses",            f:8,  m:"Cuisses, fessiers",  type:"w",  inc:5},
  legcurl:{n:"Leg curl",                   f:9,  m:"Ischio-jambiers",    type:"w",  inc:2.5},
  fentes:{n:"Fentes marchées haltères",    f:10, m:"Cuisses, fessiers · reps/jambe", type:"wm", inc:2},
  legext:{n:"Leg extension",               f:11, m:"Quadriceps · brûlure, pas charge max", type:"w", inc:2.5},
  molletsD:{n:"Mollets debout",            f:12, m:"Mollets · amplitude complète", type:"w", inc:2.5},
  molletsA:{n:"Mollets assis",             f:12, m:"Mollets · amplitude complète", type:"w", inc:2.5},
  gainage:{n:"Planche + planche latérale", f:13, m:"Gainage · secondes", type:"t",  inc:5},
  gainageL:{n:"Gainage lesté (disque)",    f:13, m:"Gainage · secondes", type:"t",  inc:5},
  devinc:{n:"Développé incliné haltères",  f:14, m:"Haut des pectoraux · banc 30-45°", type:"wm", inc:2},
  rowing1:{n:"Rowing haltère unilatéral",  f:15, m:"Dos · reps/bras",    type:"wm", inc:2},
  devmil:{n:"Développé militaire (machine)",f:16,m:"Épaules",            type:"w",  inc:2.5},
  tracas:{n:"Traction assistée",           f:17, m:"Dos · MOINS d'assistance = mieux", type:"as", inc:2.5},
  pecdeck:{n:"Pec deck (butterfly)",       f:18, m:"Pectoraux",          type:"w",  inc:2.5},
  facepull:{n:"Face pull",                 f:19, m:"Arrière d'épaules, posture · léger", type:"w", inc:2.5},
  gobelet:{n:"Squat gobelet",              f:20, m:"Cuisses, fessiers",  type:"w",  inc:2},
  sdtr:  {n:"Soulevé de terre roumain",    f:21, m:"Ischios, fessiers · dos PLAT", type:"w", inc:2.5},
  hipthrust:{n:"Hip thrust",               f:22, m:"Fessiers",           type:"w",  inc:5},
  abduct:{n:"Abducteurs machine",          f:23, m:"Extérieur hanches",  type:"w",  inc:2.5},
  abdos: {n:"Crunch poulie + relevés de jambes",f:24,m:"Abdominaux · reps chaque", type:"w", inc:2.5},
  squatb:{n:"Squat barre",                 f:26, m:"Bas du corps · cage + sécurités", type:"w", inc:2.5},
  rowbar:{n:"Rowing barre penché",         f:28, m:"Dos complet · buste 45°", type:"w", inc:2.5},
  dips:  {n:"Dips assistés",               f:29, m:"Pectoraux, triceps · MOINS d'assist. = mieux", type:"as", inc:2.5},
  dipsmax:{n:"Dips (assistance minimale)", f:29, m:"Pectoraux, triceps", type:"max", inc:0},
};

// Séances par phase. reps affiché tel quel ; top = seuil "toutes les séries au top → monte la charge"
const PLANS = {
  1:{
    hautA:{n:"Haut du corps A", ex:[
      {id:"dcb",s:3,reps:"12-15",top:15,rest:90},
      {id:"latpd",s:3,reps:"12-15",top:15,rest:90},
      {id:"devep",s:3,reps:"12-15",top:15,rest:90},
      {id:"tirh",s:3,reps:"12-15",top:15,rest:90},
      {id:"elevlat",s:3,reps:"12",top:12,rest:60},
      {id:"curl",s:2,reps:"10-12",top:12,rest:0,ss:1},
      {id:"triceps",s:2,reps:"10-12",top:12,rest:60,ss:2},
    ]},
    basA:{n:"Bas du corps A", ex:[
      {id:"presse",s:3,reps:"12-15",top:15,rest:120},
      {id:"legcurl",s:3,reps:"12-15",top:15,rest:90},
      {id:"fentes",s:3,reps:"10/jambe",top:10,rest:90},
      {id:"legext",s:2,reps:"12-15",top:15,rest:60},
      {id:"molletsD",s:3,reps:"15-20",top:20,rest:60},
      {id:"gainage",s:3,reps:"30-45 s",top:45,rest:45},
    ]},
    hautB:{n:"Haut du corps B", ex:[
      {id:"devinc",s:3,reps:"12-15",top:15,rest:90},
      {id:"rowing1",s:3,reps:"10-12/bras",top:12,rest:90},
      {id:"devmil",s:3,reps:"12-15",top:15,rest:90},
      {id:"tracas",s:3,reps:"8-10",top:10,rest:90},
      {id:"pecdeck",s:2,reps:"12-15",top:15,rest:60},
      {id:"facepull",s:3,reps:"15",top:15,rest:60},
    ]},
    basB:{n:"Bas du corps B", ex:[
      {id:"gobelet",s:3,reps:"12-15",top:15,rest:120},
      {id:"sdtr",s:3,reps:"10-12",top:12,rest:120},
      {id:"hipthrust",s:3,reps:"10-12",top:12,rest:90},
      {id:"abduct",s:2,reps:"15",top:15,rest:60},
      {id:"molletsA",s:3,reps:"15-20",top:20,rest:60},
      {id:"abdos",s:3,reps:"12-15 chaque",top:15,rest:45},
    ]},
  },
  2:{
    hautA:{n:"Haut A (force)", ex:[
      {id:"dcb",s:4,reps:"6-8",top:8,rest:150},
      {id:"rowbar",s:4,reps:"8-10",top:10,rest:120},
      {id:"devep",s:3,reps:"8-10",top:10,rest:90},
      {id:"latpd",s:3,reps:"10-12",top:12,rest:90},
      {id:"elevlat",s:3,reps:"12-15",top:15,rest:60},
      {id:"curl",s:3,reps:"10-12",top:12,rest:0,ss:1},
      {id:"triceps",s:3,reps:"10-12",top:12,rest:60,ss:2},
    ]},
    basA:{n:"Bas A (force)", ex:[
      {id:"squatb",s:4,reps:"6-8",top:8,rest:150},
      {id:"sdtr",s:3,reps:"8-10 (barre)",top:10,rest:120},
      {id:"presse",s:3,reps:"10-12",top:12,rest:90},
      {id:"legcurl",s:3,reps:"10-12",top:12,rest:90},
      {id:"molletsD",s:4,reps:"12-15",top:15,rest:60},
      {id:"gainageL",s:3,reps:"30-45 s",top:45,rest:45},
    ]},
    hautB:{n:"Haut B (volume)", ex:[
      {id:"devinc",s:4,reps:"8-10",top:10,rest:90},
      {id:"tracas",s:4,reps:"6-10",top:10,rest:120},
      {id:"dips",s:3,reps:"8-12",top:12,rest:90},
      {id:"tirh",s:3,reps:"10-12",top:12,rest:90},
      {id:"facepull",s:3,reps:"15",top:15,rest:60},
      {id:"pecdeck",s:2,reps:"12-15",top:15,rest:60},
    ]},
    basB:{n:"Bas B (volume)", ex:[
      {id:"hipthrust",s:4,reps:"8-10 (barre)",top:10,rest:120},
      {id:"fentes",s:3,reps:"10/jambe",top:10,rest:90},
      {id:"legext",s:3,reps:"12-15",top:15,rest:60},
      {id:"legcurl",s:3,reps:"12 (assis)",top:12,rest:90},
      {id:"molletsA",s:4,reps:"15",top:15,rest:60},
      {id:"abdos",s:3,reps:"12-15 chaque",top:15,rest:45},
    ]},
  },
  3:{
    push:{n:"PUSH (pecs, épaules, triceps)", ex:[
      {id:"dcb",s:4,reps:"6-8",top:8,rest:150},

// Renvoie une séance avec les exos éventuellement modifiés par l'utilisateur.

/* perfs */
function entriesOf(id){
  const out=[];
  S.log.forEach(sess=>{ (sess.entries||[]).forEach(e=>{ if(e.id===id && e.sets && e.sets.length) out.push({date:sess.date, sets:e.sets, note:e.note}); }); });
  out.sort((a,b)=>a.date<b.date?-1:1); return out;
}
function topOf(sets, type){
  const vals=sets.filter(s=>s.r>0||type==="t").map(s=>type==="t"?s.r:s.w);
  if(!vals.length) return null;
  return type==="as"?Math.min(...vals):Math.max(...vals);
}
function lastEntry(id){ const e=entriesOf(id); return e.length?e[e.length-1]:null; }
function bestVal(id){
  const e=entriesOf(id); if(!e.length) return null; const t=EX[id].type;
  const tops=e.map(x=>topOf(x.sets,t)).filter(v=>v!==null);
  if(!tops.length) return null;
  return t==="as"?Math.min(...tops):Math.max(...tops);
}
function suggest(id, plan){
  const t=EX[id].type, last=lastEntry(id);
  if(!last) return {w:"", up:false, txt:"1ʳᵉ fois — établis ta référence, technique d'abord"};
  const workSets=last.sets.filter(s=>s.r>0);
  const note=last.note?" · 📝 "+last.note:"";
  if(t==="max") return {w:"", up:false, txt:"Dernier : "+workSets.map(s=>s.r).join("/")+" reps"+note};
  if(t==="t"){
    const top=topOf(last.sets,t);
    const allT=workSets.length>=plan.s&&workSets.every(s=>s.r>=plan.top);
    return {w:top, up:allT, txt:"Dernier : "+workSets.map(s=>s.r+"s").join(" / ")+(allT?" → vise +5 s ou version lestée":"")+note};
  }
  // charge de travail = poids le plus fréquent des séries (égalité → poids de la dernière série)
  if(!workSets.length) return {w:"", up:false, txt:"Reprends où tu en étais"+note};
  const freq={}; workSets.forEach(s=>freq[s.w]=(freq[s.w]||0)+1);
  const lastW=workSets[workSets.length-1].w;
  let base=lastW, bestC=0;
  for(const k in freq){ if(freq[k]>bestC){bestC=freq[k];base=+k;} }
  if(freq[lastW]===bestC) base=lastW;
  const baseSets=workSets.filter(s=>s.w===base);
  const allTop=baseSets.length>=plan.s&&baseSets.every(s=>s.r>=plan.top);
  const inc=EX[id].inc;
  const perf="Dernier : "+fmtW(base)+" "+unitOf(id)+" — "+baseSets.map(s=>s.r).join("/");
  if(t==="as"){
    const nw=allTop?Math.max(0,base-inc):base;
    return {w:nw, up:allTop, txt:(allTop?"🔽 Top ! Passe à "+fmtW(nw)+" kg d'assistance":perf)+note};
  }
  const nw=allTop?base+inc:base;
  return {w:nw, up:allTop, txt:(allTop?"🔼 Toutes les séries au top → passe à "+fmtW(nw)+" kg !":perf)+note};
}
function weeklyAvgW(){
  const map={};
  S.weights.forEach(w=>{ const wk=weekOf(pD(w.d)); (map[wk]=map[wk]||[]).push(w.v); });
  return Object.keys(map).map(k=>({wk:+k, v:map[k].reduce((a,b)=>a+b,0)/map[k].length})).sort((a,b)=>a.wk-b.wk);
}

/* ============ TIMER DE REPOS ============ */
const Timer={iv:null,end:0,total:0,
  start(sec,label){
    this.stop(true); this.total=sec; this.end=Date.now()+sec*1000;
    $("timerlabel").textContent=label||"Repos"; $("timerbar").classList.add("on"); $("timerbar").classList.remove("zero");
    this.iv=setInterval(()=>this.tick(),200); this.tick();
  },
  add(s){ this.end+=s*1000; this.total+=s; },
  tick(){
    const left=Math.max(0,Math.ceil((this.end-Date.now())/1000));
    $("timerval").textContent=Math.floor(left/60)+":"+String(left%60).padStart(2,"0");
    $("timerprog").style.width=(this.total?left/this.total*100:0)+"%";
    if(left<=0){
      clearInterval(this.iv); this.iv=null; $("timerbar").classList.add("zero");
      $("timerlabel").textContent="GO ! Série suivante 💥";
      try{ navigator.vibrate && navigator.vibrate([200,100,200,100,400]); }catch(e){}
      beep(); setTimeout(()=>{ if($("timerbar").classList.contains("zero")) this.stop(true); },6000);
    }
  },
  stop(silent){ if(this.iv)clearInterval(this.iv); this.iv=null; $("timerbar").classList.remove("on","zero"); }
};
function beep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    [0,.25,.5].forEach((t,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type="sine";o.frequency.value=i===2?1320:880;
      g.gain.setValueAtTime(.4,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.2);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.22);
    });
  }catch(e){}
}

function bumpQW(x){ const i=$("qweight"); i.value=(Math.round((parseFloat(i.value||0)+x)*10)/10); }
function addQW(){
  const v=parseFloat($("qweight").value); if(!v||v<40||v>200){toast("Poids invalide");return;}
  const ds=fmtD(today());
  S.weights=S.weights.filter(w=>w.d!==ds); S.weights.push({d:ds,v}); S.weights.sort((a,b)=>a.d<b.d?-1:1);
  save(); toast("Poids noté : "+fmtW(v)+" kg 👊"); rHome();
}
function togHabit(k){ const ds=fmtD(today()); S.habits[ds]=S.habits[ds]||{}; S.habits[ds][k]=S.habits[ds][k]?0:1; save(); rHome(); }

  const d=today(), wk=Math.min(Math.max(weekOf(d),1),TOTAL_WEEKS), ph=phaseOf(wk);
  const planKey=WEEKPLAN[ph][d.getDay()];
  let h=`<div class="card"><h3>🏋️ Nouvelle séance <span class="sub">Phase ${ph}</span></h3>`;

    const idx=S.log.length-1-i;

    h+=`<div class="spread" style="padding:9px 0;border-top:1px solid var(--line)">

    h+=`<div class="eexo">

        <div style="min-width:0;padding-right:8px"><b class="sm">${i+1}. ${esc(x?x.n:e.id)}</b><div class="xs mut">${x?esc(x.m):''}</div></div>
        <div class="row">
          <button class="ebtn" onclick="peMove(${i},-1)" ${i===0?'disabled':''}>▲</button>

function peSave(rerender){ setPlanEdit(PE.ph,PE.key,PE.ex); if(rerender!==false) renderSessionEditor(); }
function peMove(i,d){ const a=PE.ex, j=i+d; if(j<0||j>=a.length)return; const t=a[i]; a[i]=a[j]; a[j]=t; peSave(); }
function peField(i,k,v){
  if(k==='s'){ PE.ex[i].s=Math.max(1,Math.min(8,parseInt(v)||1)); }
  else if(k==='rest'){ PE.ex[i].rest=Math.max(0,Math.min(300,parseInt(v)||0)); }
  else { PE.ex[i].reps=v; if(k==='reps'){ const n=parseInt((v.match(/\d+/g)||[]).slice(-1)[0]); if(n) PE.ex[i].top=n; } }
  peSave(false);
}
function peDelete(i){ if(PE.ex.length<=1){toast("Garde au moins un exercice");return;} if(confirm("Retirer cet exercice ?")){ PE.ex.splice(i,1); peSave(); } }
function peReset(){ if(confirm("Rétablir la séance d'origine ? Tes modifs seront perdues.")){ resetPlanEdit(PE.ph,PE.key); PE.ex=workingEx(PE.ph,PE.key); renderSessionEditor(); } }
function peAdd(){ peOpenPicker(-1); }
function peReplace(i){ peOpenPicker(i); }
function peOpenPicker(i){
  PE.pickTarget=i;
  let h=`<h3 style="margin-bottom:8px">${i<0?'＋ Ajouter un exercice':'🔁 Choisir le remplaçant'}</h3>
    <input id="exsearch" placeholder="🔍 Rechercher (nom ou muscle)…" style="width:100%;margin-bottom:10px" oninput="renderPickerList(this.value)" autocomplete="off">

    <button class="btn ghost small" style="width:100%;margin-top:10px" onclick="renderSessionEditor()">Annuler</button>`;
  openModal(h);
  renderPickerList('');
  const el=$('exsearch'); if(el) el.focus();
}
function renderPickerList(q){
  const ql=(q||'').toLowerCase().trim();
  const cur=new Set(PE.ex.map(e=>e.id));
  const ids=Object.keys(EX).filter(id=>{ const x=EX[id]; return !ql||x.n.toLowerCase().includes(ql)||x.m.toLowerCase().includes(ql); });
  const h=ids.map(id=>{ const x=EX[id], inS=cur.has(id);
    return `<button class="btn ghost small" style="width:100%;text-align:left;margin-bottom:6px" onclick="pePick('${id}')"><b>${esc(x.n)}</b> <span class="xs mut">· ${esc(x.m)}</span>${inS?' <span class="badge pr">déjà là</span>':''}</button>`;

function pePick(id){
  const i=PE.pickTarget;
  if(i<0) PE.ex.push({id,s:3,reps:"12-15",top:15,rest:90});
  else PE.ex[i]=Object.assign({},PE.ex[i],{id});
  peSave();
}

function startWorkout(key){
  const wk=Math.min(Math.max(weekOf(today()),1),TOTAL_WEEKS), ph=phaseOf(wk);
  const plan=planOf(ph,key); if(!plan){toast("Séance introuvable");return;}
  if(S.draft && !confirm("Une séance est déjà en cours. L'abandonner ?")) { switchTab("workout"); return; }
  const deload=(wk===15||wk===16||wk===26);
  S.draft={key, name:plan.n, phase:ph, date:fmtD(today()), startTs:Date.now(), deload,
    entries:plan.ex.map(p=>{
      const sg=suggest(p.id,p);
      let w=sg.w===""?"":sg.w;
      let nsets=deload?2:p.s;
      if(deload&&typeof w==="number"&&EX[p.id].type!=="as") w=Math.round(w*0.7/EX[p.id].inc)*EX[p.id].inc;
      return {id:p.id, plan:p, note:"", open:true,
        sets:[...Array(nsets)].map(()=>({w:w===""?"":w, r:"", done:false}))};
    })};
  save(); switchTab("workout");
}
function renderActive(){
  const D=S.draft;
  const mins=Math.floor((Date.now()-D.startTs)/60000);
  const totalSets=D.entries.reduce((a,e)=>a+e.sets.length,0);
  const doneSets=D.entries.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);
  let h=`<div class="card"><div class="spread"><h3 style="margin:0">🔥 ${esc(D.name)}</h3><span class="badge rest">${mins} min</span></div>
    <div class="pbar green" style="margin-top:10px"><div style="width:${totalSets?doneSets/totalSets*100:0}%"></div></div>
    <div class="xs mut">${doneSets}/${totalSets} séries ${D.deload?"· 🪶 SEMAINE ALLÉGÉE : -30 % charge, 2 séries":""}</div></div>`;
  D.entries.forEach((e,ei)=>{
    const ex=EX[e.id], p=e.plan, sg=suggest(e.id,p);
    const allDone=e.sets.length&&e.sets.every(s=>s.done);
    const unit=unitOf(e.id);
    h+=`<div class="exo ${allDone?"done":""}">
      <div class="exohead" onclick="togExo(${ei})">
        <div>
          <div class="name">${allDone?"✅ ":""}${esc(ex.n)} ${p.ss===1?'<span class="badge pr">SUPERSET ↓</span>':""}</div>
          <div class="meta">${p.s}×${esc(p.reps)} · repos ${p.rest?p.rest+" s":"0 — enchaîne !"} · ${esc(ex.m)}</div>
          <div class="meta ${sg.up?"ok":""}" style="font-weight:600">${esc(sg.txt)}</div>
        </div>
        <div class="row"><span class="badge f" onclick="event.stopPropagation();showFiche(${ex.f})">F${ex.f}</span><span class="collapse-btn">${e.open?"▾":"▸"}</span></div>
      </div>`;
    if(e.open){
      e.sets.forEach((s,si)=>{
        const isT=ex.type==="t", isMax=ex.type==="max";
        h+=`<div class="setrow"><div class="setnum">${si+1}</div>`;

          h+=`<div class="stepper"><button onclick="stepSet(${ei},${si},'w',-${ex.inc})">−</button>

          <button onclick="stepSet(${ei},${si},'w',${ex.inc})">+</button></div>`;
        }
        h+=`<div class="stepper"><button onclick="stepSet(${ei},${si},'r',-1)">−</button>
        <input type="number" inputmode="numeric" value="${s.r}" placeholder="${isT?"sec":"reps"}" onchange="editSet(${ei},${si},'r',this.value)">
        <button onclick="stepSet(${ei},${si},'r',1)">+</button></div>
        <button class="vbtn ${s.done?"on":""}" onclick="togSet(${ei},${si})">✓</button></div>`;
      });
      h+=`<div style="padding:8px 12px 12px">
        <button class="btn small ghost" onclick="addSet(${ei})">+ série</button>
        <input class="exonote" placeholder="Note (sensation, réglage machine, douleur...)" value="${esc(e.note)}" onchange="S.draft.entries[${ei}].note=this.value;save()">
      </div>`;
    }
    h+=`</div>`;
  });
  h+=`<button class="btn ok" onclick="finishWorkout()">🏁 Terminer la séance</button>
  <button class="btn danger" style="margin-top:10px" onclick="cancelWorkout()">Abandonner (rien ne sera sauvé)</button>
  <div style="height:70px"></div>`;
  $("pg-workout").innerHTML=h;
}
function togExo(ei){ S.draft.entries[ei].open=!S.draft.entries[ei].open; save(); renderActive(); }
function stepSet(ei,si,k,d){
  const s=S.draft.entries[ei].sets[si];
  const cur=parseFloat(s[k])||0;
  s[k]=Math.max(0,Math.round((cur+d)*10)/10);
  save(); renderActive();
}
function editSet(ei,si,k,v){ S.draft.entries[ei].sets[si][k]=v===""?"":Math.max(0,parseFloat(v)||0); save(); }
function addSet(ei){
  const sets=S.draft.entries[ei].sets, last=sets[sets.length-1];
  sets.push({w:last?last.w:"",r:"",done:false}); save(); renderActive();
}
function togSet(ei,si){
  const e=S.draft.entries[ei], s=e.sets[si];
  s.done=!s.done;
  if(s.done&&(s.r===""||s.r===0)){ s.r=e.plan.top===99?"":e.plan.top; }
  save(); renderActive();
  if(s.done){
    if(e.plan.rest>0) Timer.start(e.plan.rest,"Repos · "+EX[e.id].n.split(" ").slice(0,3).join(" "));
    else if(e.plan.ss===1) toast("SUPERSET → enchaîne direct sur l'exo suivant ! 💥");
  }
}
function cancelWorkout(){ if(confirm("Abandonner la séance ?")){ S.draft=null; save(); Timer.stop(); rWorkout(); } }
function finishWorkout(){
  const D=S.draft;
  const entries=D.entries.map(e=>({id:e.id, note:e.note, sets:e.sets.filter(s=>(parseFloat(s.r)||0)>0).map(s=>({w:parseFloat(s.w)||0,r:parseFloat(s.r)||0}))})).filter(e=>e.sets.length||e.note);
  if(!entries.some(e=>e.sets.length)){ toast("Aucune série remplie !"); return; }
  // PRs (avant d'ajouter au log)
  const prs=[];
  entries.forEach(e=>{
    const t=EX[e.id].type; if(t==="max"||t==="t")return;
    const prev=bestVal(e.id), cur=topOf(e.sets,t);
    if(cur!==null&&prev!==null&&(t==="as"?cur<prev:cur>prev)) prs.push(EX[e.id].n+" : "+fmtW(cur)+" "+unitOf(e.id)+(t==="as"?" (moins d'assistance !)":" (ancien : "+fmtW(prev)+")"));
    if(cur!==null&&prev===null) prs.push(EX[e.id].n+" : référence établie à "+fmtW(cur)+" "+unitOf(e.id));
  });
  const dur=Math.max(1,Math.round((Date.now()-D.startTs)/60000));
  const tonnage=Math.round(entries.reduce((a,e)=>EX[e.id].type==="w"||EX[e.id].type==="wm"?a+e.sets.reduce((x,s)=>x+s.w*s.r*(EX[e.id].type==="wm"?2:1),0):a,0));
  const nsets=entries.reduce((a,e)=>a+e.sets.length,0);
  S.log.push({date:D.date,key:D.key,name:D.name,phase:D.phase,dur,entries});
  S.log.sort((a,b)=>a.date<b.date?-1:1);
  S.draft=null; save(); Timer.stop();
  openModal(`<h3 style="margin-bottom:14px">🏁 Séance terminée — bravo !</h3>
    <div class="grid3">
      <div class="statbox"><div class="v">${dur}</div><div class="l">min</div></div>
      <div class="statbox"><div class="v">${nsets}</div><div class="l">séries</div></div>
      <div class="statbox"><div class="v">${tonnage>=1000?(tonnage/1000).toFixed(1).replace(".",",")+" t":tonnage+" kg"}</div><div class="l">tonnage</div></div>
    </div>
    ${prs.length?`<div class="alertcard warn" style="margin-top:14px">🏆 <b>Records battus :</b><br>${prs.map(esc).join("<br>")}</div>`:""}
    <div class="sm mut" style="margin:12px 0;line-height:1.6">💪 N'oublie pas : shaker whey + banane à 16h. Et ce soir, couché 22h30 — c'est là que le muscle se construit.</div>

}

/* ============ SVG CHARTS ============ */
function svgChart(pts, opts){
  // pts: [{x:Date, y:val, lbl}], opts: {h, targets:[{x,y,l}], range:[minX,maxX], inv:bool, band:[{x,lo,hi,l}]}
  const W=520, H=opts.h||170, P={l:34,r:8,t:12,b:20};
  if(!pts.length) return `<div class="sm mut" style="padding:14px">Pas encore de données.</div>`;
  let xs=pts.map(p=>+p.x), ys=pts.map(p=>p.y);
  (opts.targets||[]).forEach(t=>{xs.push(+t.x);ys.push(t.y);});
  (opts.band||[]).forEach(b=>{xs.push(+b.x);ys.push(b.lo,b.hi);});
  if(opts.range){xs.push(+opts.range[0],+opts.range[1]);}
  let x0=Math.min(...xs),x1=Math.max(...xs),y0=Math.min(...ys),y1=Math.max(...ys);
  if(x1-x0<864e5*7){x1=x0+864e5*7;}
  const pad=(y1-y0)*0.12||2; y0-=pad; y1+=pad;
  const X=v=>P.l+(v-x0)/(x1-x0)*(W-P.l-P.r), Y=v=>P.t+(1-(v-y0)/(y1-y0))*(H-P.t-P.b);
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // grid
  for(let i=0;i<=3;i++){ const yv=y0+(y1-y0)*i/3;
    s+=`<line x1="${P.l}" y1="${Y(yv)}" x2="${W-P.r}" y2="${Y(yv)}" stroke="#262d3d" stroke-width="1"/>
    <text x="${P.l-5}" y="${Y(yv)+3}" fill="#8b93a7" font-size="9" text-anchor="end">${fmtW(Math.round(yv*10)/10)}</text>`; }
  // milestone bands (poids)
  (opts.band||[]).forEach(b=>{
    s+=`<rect x="${X(+b.x)-3}" y="${Y(b.hi)}" width="6" height="${Math.max(2,Y(b.lo)-Y(b.hi))}" rx="2" fill="rgba(61,220,132,.55)"/>`;
  });
  // targets
  (opts.targets||[]).forEach(t=>{
    s+=`<circle cx="${X(+t.x)}" cy="${Y(t.y)}" r="4.5" fill="none" stroke="#ffd166" stroke-width="2"/>
    <text x="${Math.min(X(+t.x),W-40)}" y="${Y(t.y)-8}" fill="#ffd166" font-size="8.5" text-anchor="middle">${fmtW(t.y)}</text>`;
  });
  // line
  const path=pts.map((p,i)=>(i?"L":"M")+X(+p.x).toFixed(1)+" "+Y(p.y).toFixed(1)).join(" ");
  s+=`<path d="${path}" fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
  <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff7a2f"/><stop offset="1" stop-color="#ffb15c"/></linearGradient></defs>`;
  pts.forEach(p=>{ s+=`<circle cx="${X(+p.x)}" cy="${Y(p.y)}" r="3.2" fill="#ffb15c"/>`; });
  // x labels (first, mid, last)
  [pts[0],pts[Math.floor(pts.length/2)],pts[pts.length-1]].forEach((p,i)=>{
    if(!p)return; s+=`<text x="${X(+p.x)}" y="${H-6}" fill="#8b93a7" font-size="9" text-anchor="${i===0?"start":i===2?"end":"middle"}">${frD(fmtD(p.x))}</text>`;
  });
  return s+"</svg>";
}

function rProgress(){

  });

  const tg=(TARGETS[progressEx]||[]).map(t=>({x:pD(t.d),y:t.v,l:t.l}));
  h+=`<div class="card"><h3>📈 Progression des charges</h3>

  if(ent.length){
    h+=`<table class="tbl" style="margin-top:8px"><tr><th>Date</th><th>Séries</th><th>Note</th></tr>`;
    [...ent].reverse().slice(0,5).forEach(e=>{
      h+=`<tr><td class="xs">${frD(e.date)}</td><td class="xs" style="white-space:nowrap">${e.sets.map(s=>(s.w?fmtW(s.w)+"×":"")+s.r).join(" · ")}</td><td class="xs mut">${esc(e.note||"")}</td></tr>`;
    });

function importJSON(inp){
  const f=inp.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.log||!d.weights) throw 0; S=d; save(); toast("Données importées ✅"); rBody(); }catch(e){ toast("Fichier invalide"); } };
  r.readAsText(f);
}
function buildBilan(){
  const d=today(), since=new Date(d); since.setDate(d.getDate()-28); const sd=fmtD(since);
  const wk=weekOf(d), ph=phaseOf(wk);
  let md=`# Bilan SCULPTÉ — ${frD(fmtD(d))} (semaine ${wk}, phase ${ph})\n\n## Poids\n`;
  const wavg=weeklyAvgW();
  md+=`- Actuel : ${S.weights.length?fmtW(S.weights[S.weights.length-1].v)+" kg":"?"} (départ 94 kg)\n`;
  if(wavg.length) md+=`- Moyennes hebdo : ${wavg.slice(-5).map(w=>"S"+w.wk+": "+fmtW(Math.round(w.v*10)/10)).join(" · ")}\n`;
  if(S.waists.length) md+=`\n## Tour de taille\n${S.waists.slice(-5).map(w=>"- "+frD(w.d)+" : "+fmtW(w.v)+" cm").join("\n")}\n`;
  const recent=S.log.filter(s=>s.date>=sd);
  md+=`\n## Séances (28 derniers jours) : ${recent.length} muscu · ${S.cardio.filter(c=>c.d>=sd).length} cardio\n`;
  md+=`\n## Charges (meilleure série, 28 j)\n| Exercice | Début période | Maintenant |\n|---|---|---|\n`;
  const ids=[...new Set(recent.flatMap(s=>s.entries.map(e=>e.id)))];
  ids.forEach(id=>{
    const es=entriesOf(id).filter(e=>e.date>=sd); if(!es.length)return;
    const t=EX[id].type; const first=topOf(es[0].sets,t), last=topOf(es[es.length-1].sets,t);
    md+=`| ${EX[id].n} | ${first!==null?fmtW(first)+" "+unitOf(id):"—"} | ${last!==null?fmtW(last)+" "+unitOf(id):"—"} |\n`;
  });
  const notes=recent.flatMap(s=>s.entries.filter(e=>e.note).map(e=>frD(s.date)+" · "+EX[e.id].n+" : "+e.note));
  if(notes.length) md+=`\n## Notes de séance\n${notes.map(n=>"- "+n).join("\n")}\n`;
  md+=`\nQuestions pour Claude : ajustements programme / nutrition ?`;
  return md;
}
function showBilan(){
  const md=buildBilan();
  openModal(`<h3 style="margin-bottom:10px">📋 Bilan pour Claude</h3>
  <textarea id="bilantxt" style="height:220px;font-size:.75rem;line-height:1.5">${esc(md)}</textarea>
  <div class="grid2" style="margin-top:12px">
    <button class="btn small" onclick="copyBilan()">📋 Copier</button>
    ${navigator.share?'<button class="btn small ghost" onclick="navigator.share({text:$(\'bilantxt\').value})">↗ Partager</button>':'<button class="btn small ghost" onclick="closeModal()">Fermer</button>'}
  </div>`);
}
function copyBilan(){
  const t=$("bilantxt"); t.select();
  if(navigator.clipboard) navigator.clipboard.writeText(t.value).then(()=>toast("Copié ! Colle-le dans Claude 🤖"));
  else{ document.execCommand("copy"); toast("Copié !"); }
}

/* ============ PAGE : GUIDE ============ */

  let h=`<div class="card"><h3>🗺️ Le plan des 6 mois</h3><table class="tbl">

    <tr ${ph===2?'style="color:var(--acc2)"':""}><td><b>2 · Construction</b></td><td>9-16</td><td>4× Haut/Bas · barres libres</td><td>85-86,5 kg</td></tr>
    <tr ${ph===3?'style="color:var(--acc2)"':""}><td><b>3 · Sculpture</b></td><td>17-26</td><td>5× Push/Pull/Legs+H/B</td><td>82,5-84 kg</td></tr></table>
    <div class="xs mut" style="margin-top:8px;line-height:1.6">Sem. 9-10 : diet break (~2 800 kcal) · Sem. 15-16 et 26 : semaines allégées · Fin mois 4 : 1ʳᵉ traction sans assistance 🏆</div></div>`;
  // séances par phase
  [1,2,3].forEach(p=>{
    h+=`<div class="card"><h3>${p===ph?"▶ ":""}Phase ${p} — séances</h3>`;
    Object.keys(PLANS[p]).forEach(k=>{
      const pl=planOf(p,k);
      h+=`<details class="fiche"><summary>${esc(pl.n)}<span class="collapse-btn">▾</span></summary><div class="fbody"><table class="tbl">`;
      pl.ex.forEach(e=>{ h+=`<tr><td><span class="badge f" onclick="showFiche(${EX[e.id].f})">F${EX[e.id].f}</span> ${esc(EX[e.id].n)}</td><td style="white-space:nowrap">${e.s}×${esc(e.reps)}</td><td class="mut" style="white-space:nowrap">${e.rest?e.rest+" s":"superset"}</td></tr>`; });
      h+=`</table></div></details>`;
    });
    h+=`</div>`;
  });
  // semaine type
  h+=`<div class="card"><h3>📅 Semaine type</h3><table class="tbl">
    <tr><th></th><th>Matin 6h30</th><th>14h30</th></tr>
    <tr><td><b>Lun</b></td><td>Cardio Z2 35' + gainage</td><td>Muscu</td></tr>
    <tr><td><b>Mar</b></td><td>😴 Repos</td><td>Muscu</td></tr>
    <tr><td><b>Mer</b></td><td>Cardio (HIIT dès sem. 3)</td><td>${ph===3?"Muscu (Phase 3)":"—"}</td></tr>
    <tr><td><b>Jeu</b></td><td>😴 Repos</td><td>Muscu</td></tr>
    <tr><td><b>Ven</b></td><td>Cardio Z2 35' + gainage</td><td>Muscu</td></tr>
    <tr><td><b>W-E</b></td><td colspan="2">8 000 pas/jour · repos total salle</td></tr></table></div>`;
  // fiches
  h+=`<div class="card"><h3>📚 Les 29 fiches techniques</h3>`;
  const fnames={};
  Object.values(EX).forEach(e=>{ if(!fnames[e.f]) fnames[e.f]=e.n; });
  fnames[25]="Dead bug (gainage du matin)";
  Object.keys(FICHES).forEach(n=>{
    h+=`<details class="fiche"><summary><span><span class="badge f">F${n}</span> ${esc(fnames[n]||"")}</span><span class="collapse-btn">▾</span></summary>
    <div class="fbody"><b>OÙ / QUOI</b> ${esc(FICHES[n][0])}<br><b>EXÉCUTION</b> ${esc(FICHES[n][1])}<br><b style="color:var(--bad)">ERREURS</b> ${esc(FICHES[n][2])}</div></details>`;
  });
  h+=`</div>`;
  // nutrition
  h+=`<div class="card"><h3>🍽️ Nutrition — 70 % du résultat</h3><table class="tbl"><tr><th>Période</th><th>Kcal/j</th></tr>`;
  NUTRI.forEach(n=>{ h+=`<tr><td>${esc(n.p)}<div class="xs mut">${esc(n.n)}</div></td><td style="white-space:nowrap"><b>${esc(n.k)}</b></td></tr>`; });
  h+=`</table><div class="sm" style="margin-top:10px;line-height:1.7"><b class="accent">Les 5 règles « je mange en famille » :</b><br>
  1️⃣ Assiette 50 % légumes / 25 % protéines / 25 % féculents<br>2️⃣ Double TA protéine à chaque repas (œufs, thon, poulet, fromage blanc)<br>3️⃣ Rab de légumes/viande OK, jamais de féculents<br>4️⃣ Zéro calorie liquide en semaine<br>5️⃣ Dessert = 3 bouchées ou un fruit</div></div>`;
  // règles
  h+=`<div class="card"><h3>⚡ Les 5 règles non négociables</h3>`;
  RULES.forEach(r=>{ h+=`<div style="padding:8px 0;border-top:1px solid var(--line)"><b class="sm">${r[0]}</b><div class="xs mut" style="margin-top:2px;line-height:1.5">${r[1]}</div></div>`; });
  h+=`</div><div class="quote">« ${QUOTES[0]} »</div>`;
  $("pg-guide").innerHTML=h;
}
